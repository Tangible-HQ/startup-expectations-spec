name: PolinRider Security Scan

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  scan:
    name: PolinRider scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run PolinRider malware scan
        run: node scripts/scan-polinrider.mjs
