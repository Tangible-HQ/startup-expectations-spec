id: board-investor-reporting-rhythm
title: Board and investor reporting
category: funding
version: 0.1.0
summary: Send clear updates once investors are on the cap table or you have a board.
tags:
- board
- reporting
agent_hint: Metrics narrative, asks, and cash; predictable meeting or email rhythm.
levels:
  - id: l0
    label: No rhythm
    summary: Investors get updates when founders remember to send them.
    bar: No predictable cadence or standard format.
    exit_criteria:
      - First investor update sent in any format
  - id: l1
    label: Ad hoc updates
    summary: Occasional email updates with no standard format or timing.
    bar: Investors are not surprised by major news; updates happen at least quarterly.
    exit_criteria:
      - Update cadence agreed with investors (monthly or quarterly)
      - Standard metrics included in every update
  - id: l2
    label: Regular cadence
    summary: Monthly or quarterly updates with standard metrics and clear asks.
    bar: Investors receive updates on time; asks are specific and actionable.
    exit_criteria:
      - Updates sent within 2 weeks of period end
      - Each update includes cash, top metrics, wins, blockers, and asks
  - id: l3
    label: Board meetings
    summary: Structured board meetings with pre-reads, decisions logged, bad news shared proactively.
    bar: Board is never surprised; decisions are made in meetings, not hallways.
    exit_criteria:
      - Board meeting cadence set (quarterly minimum); pre-read sent 48h in advance
      - Action items tracked from meeting to meeting
stage_relevance:
  primary: seed
  applies_to: [seed, series-a]
  ignore_before: pre-seed
load:
- goals/funding/board-investor-reporting-rhythm/README.md
- shared/roles/engineering-manager/responsibilities.md
- industries/technology/segments/enterprise-saas/roles/engineering-manager/role.yaml
- industries/technology/segments/enterprise-saas/roles/engineering-manager/responsibilities.md
