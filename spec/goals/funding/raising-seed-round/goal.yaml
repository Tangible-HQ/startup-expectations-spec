id: raising-seed-round
title: Raising a seed round
category: funding
version: "0.1.0"
summary: Get seed funding with a clear story, real traction signals, and a believable plan for the money.
tags:
  - fundraising
  - investors
  - runway
agent_hint: Put clarity for investors first—traction, milestones, and how you will spend the round—before deep internal engineering detail.
levels:
  - id: l0
    label: No process
    summary: No deck, no investor outreach, no fundraising plan.
    bar: Founders have not started fundraising activities.
    exit_criteria:
      - Target raise amount and use of funds defined
      - At least one investor conversation attempted
  - id: l1
    label: Informal outreach
    summary: Deck exists and warm intro meetings are happening but nothing is tracked.
    bar: Consistent story told; meetings being booked from warm intros.
    exit_criteria:
      - Pitch deck drafted and iterated at least once based on feedback
      - 5+ investor meetings completed
  - id: l2
    label: Active process
    summary: Pipeline tracked, clear ask defined, data room ready for diligence.
    bar: Investors are in diligence or term sheet conversations; no surprises in data room.
    exit_criteria:
      - CRM or tracker with investor stages updated weekly
      - Data room populated with cap table, financials, and key metrics
  - id: l3
    label: Round closed
    summary: Signed documents, funds wired, cap table updated, reporting cadence established.
    bar: All legal docs signed, funds received, new investors onboarded.
    exit_criteria:
      - Wire received and cap table reflects new investors
      - First investor update sent within 30 days of close
stage_relevance:
  primary: seed
  applies_to: [seed]
  ignore_before: pre-seed
load:
  - goals/funding/raising-seed-round/README.md
  - shared/roles/engineering-manager/responsibilities.md
  - industries/technology/segments/enterprise-saas/roles/engineering-manager/role.yaml
  - industries/technology/segments/enterprise-saas/roles/engineering-manager/responsibilities.md
